<!DOCTYPE html>
<html>
<head>
    <title>Border Table</title>
    <style type="text/css">
        table, th, td {
                border: 0.5px solid black;
        }
    </style>
</head>
<body>
<table>
    <tr><th>Nama Depan</th><th>Nama</th></tr>
    <tr><td>Angler</td><td>Fish</td></tr>
    <tr><td>George</td><td>Katlyne</td></tr>
    <tr><td>Porch</td><td>Bella</td></tr>
</table>
</body>
</html>
